n\u003cp\u003e\u003cstrong\u003eMacOS terminal command:\u003c\\/strong\u003e\u003c\\/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\&quot;lang-auto\\\&quot;\u003erm -rf ~/Library/Application\\\\ Support/RoasTime/deps\\n\u003c\\/code\u003e\u003c\\/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWindows terminal command:\u003c\\/strong\u003e\u003c\\/p\u003e\\n\u003cp\u003e\u003ccode\u003erd /s /q C:\\\\Users\\\\\\\&quot;YOUR USER NAME\\\&quot;\\\\AppData\\\\Roaming\\\\RoasTime\\\\deps\u003c\\/code\u003e\u003c\\/p\u003e\\n\u003cp\u003eAs an alternative to the above commands, you can manually remove the “deps” folder at the following location depending on your operating system. Hidden files/folders may need to be enabled first before attempting this.\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eWindows\u003c\\/strong\u003e\u003cbr\u003e\\nPath: \u003ccode\u003eC:\\\\Users\\\\\\\&quot;YOUR USER NAME\\\&quot;\\\\AppData\\\\Roaming\\\\RoasTime\\\\deps\u003c\\/code\u003e\u003cbr\u003e\\n\u003ca href=\\\&quot;https://support.microsoft.com/en-us/windows/view-hidden-files-and-folders-in-windows-97fbc472-c603-9d90-91d0-1166d1d9f4b5\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\u003eHow to view hidden files on Windows\u003c\\/a\u003e\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eMac\u003c\\/strong\u003e\u003cbr\u003e\\nPath: \u003ccode\u003e~/Library/Application\\\\ Support/RoasTime/deps\u003c\\/code\u003e\u003cbr\u003e\\n\u003ca href=\\\&quot;https://www.graphpad.com/support/faq/how-to-view-files-on-your-mac-that-are-normally-invisible/#:~:text=In%20Finder%2C%20open%20up%20your,hidden%20files%20will%20become%20visible.\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\u003eHow to view hidden files on Mac\u003c\\/a\u003e\u003c\\/p\u003e\\n\u003cp\u003eWe apologize for the inconvenience and for not posting sooner but we didn’t realize it was effecting many people. Steps are being taken to ensure this doesn’t happen again.\u003c\\/p\u003e\\n\u003c\\/blockquote\u003e\&quo :13478,\&quot;topic_slug\&quot;:\&quot;us-champion-andrew-coe-s-light-roast-recipe\&quot;,\&quot;display_username\&quot;:\&quot;Jimmy_BulletRoaster#1fan\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:4996,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:1,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;reactions\&quot;:[],\&quot;current_user_reaction\&quot;:null,\&quot;reaction_users_count\&quot;:0,\&quot;current_user_used_main_reaction\&quot;:false,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:false},{\&quot;id\&quot;:33027,\&quot;name\&quot;:\&quot;Bullet R1 User\&quot;,\&quot;username\&quot;:\&quot;gabyritaseek.qiAO\&quot;,\&quot;avatar_template\&quot;:\&quot;/letter_avatar_proxy/v4/letter/g/7c8e57/{size}.png\&quot;,\&quot;created_at\&quot;:\&quot;2023-12-06T02:08:52.455Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eAndy, just one last question please.   Can you please elaborate on your reasons for using the F5 fan setting from start to finish?\\u003c/p\\u003e\\n\\u003cp\\u003eIs is mainly to avoid scorching/tipping?\\u003cbr\\u003e\\nOr to avoid smokey flavours in the roasted beans?\\u003cbr\\u003e\\nOr simply to remove chaff more effectively?\\u003cbr\\u003e\\nOr something else completely?\\u003c/p\\u003e\\n\\u003cp\\u003eI would love to know your thoughts.\\u003c/p\\u003e\\n\\u003cp\\u003eThanks again and best regards,\\u003cbr\\u003e\\nGaby\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:15,\&quot;post_type\&quot;:1,\&quot;updated_at\&quot;:\&quot;2023-12-06T02:08:52.455Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:12,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:3,\&quot;reads\&quot;:226,\&quot;readers_count\&quot;:225,\&quot;score\&quot;:95.2,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:13478,\&quot;topic_slug\&quot;:\&quot;us-champion-andrew-coe-s-light-roast-recipe\&quot;,\&quot;display_username\&quot;:\&quot;Bullet R1 User\&quot;,\&quot;primary_group_name\&quot;:null,\&quot;flair_name\&quot;:null,\&quot;flair_url\&quot;:null,\&quot;flair_bg_color\&quot;:null,\&quot;flair_color\&quot;:null,\&quot;flair_group_id\&quot;:null,\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;read\&quot;:true,\&quot;user_title\&quot;:null,\&quot;reply_to_user\&quot;:{\&quot;username\&quot;:\&quot;veloandy\&quot;,\&quot;name\&quot;:\&quot;Andrew Coe\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/community.roast.world/veloandy/{size}/322_2.png\&quot;},\&quot;bookmarked\&quot;:false,\&quot;actions_summary\&quot;:[{\&quot;id\&quot;:2,\&quot;count\&quot;:2}],\&quot;moderator\&quot;:false,\&quot;admin\&quot;:false,\&quot;staff\&quot;:false,\&quot;user_id\&quot;:4816,\&quot;hidden\&quot;:false,\&quot;trust_level\&quot;:2,\&quot;deleted_at\&quot;:null,\&quot;user_deleted\&quot;:false,\&quot;edit_reason\&quot;:null,\&quot;can_view_edit_history\&quot;:true,\&quot;wiki\&quot;:false,\&quot;reactions\&quot;:[{\&quot;id\&quot;:\&quot;heart\&quot;,\&quot;type\&quot;:\&quot;emoji\&quot;,\&quot;count\&quot;:2}],\&quot;current_user_reaction\&quot;:null,\&quot;reaction_users_count\&quot;:2,\&quot;current_user_used_main_reaction\&quot;:false,\&quot;can_accept_answer\&quot;:false,\&quot;can_unaccept_answer\&quot;:false,\&quot;accepted_answer\&quot;:false,\&quot;topic_accepted_answer\&quot;:false},{\&quot;id\&quot;:33028,\&quot;name\&quot;:\&quot;Andrew Coe\&quot;,\&quot;username\&quot;:\&quot;veloandy\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/community.roast.world/veloandy/{size}/322_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2023-12-06T03:06:44.451Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eYeah good question - the fan can have a cooling effect on the roast depending on the ambient temperature. The inlet air is heated only indirectly by passing through the roaster between the drum and induction unit. (If you think about the total heat in the roasting system, either you are adding heat through the air and less on the drum surface, or you are cooling the air but compensating with a hotter drum surface. I know some folks have successfully implemented this, but I haven’t had good results, I should test this more, it probably works well for some coffees and less for others.) But I also want the fan to be high enough to remove chaff and smoke. So I want to find the fastest fan set point where it is still low enough that it is still heating the roast, Typically, F5 is the highest if the environment is fairly warm, F4 for cooler conditions, and F3 if it is very very cold (I’ve roasted in a 45f garage before, but I don’t recommend that. Adding a space heater in the area can help).\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:16,\&quot;post_type\&quot;:1,\&quot;updated_at\&quot;:\&quot;2023-12-06T03:06:44.451Z\&quot;,\&quot;reply_count\&quot;:1,\&quot;reply_to_post_number\&quot;:15,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:6,\&quot;reads\&quot;:215,\&quot;readers_count\&quot;:214,\&quot;score\&quot;:258.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:13478,\&quot;topic_slug\&quot;:\&quot;us-champion-a               <span itemprop='position'>16</span>

            </div>
            <div class='post' itemprop='text'>
              <p>Yeah good question - the fan can have a cooling effect on the roast depending on the ambient temperature. The inlet air is heated only indirectly by passing through the roaster between the drum and induction unit. (If you think about the total heat in the roasting system, either you are adding heat through the air and less on the drum surface, or you are cooling the air but compensating with a hotter drum surface. I know some folks have successfully implemented this, but I haven’t had good results, I should test this more, it probably works well for some coffees and less for others.) But I also want the fan to be high enough to remove chaff and smoke. So I want to find the fastest fan set point where it is still low enough that it is still heating the roast, Typically, F5 is the highest if the environment is fairly warm, F4 for cooler conditions, and F3 if it is very very cold (I’ve roasted in a 45f garage before, but I don’t recommend that. Adding a space heater in the area can help).</p>
            </div>
