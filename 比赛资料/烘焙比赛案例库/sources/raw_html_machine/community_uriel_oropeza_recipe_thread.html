.world/original/2X/7/777eb747c645e2e018e879f5bfe0d57ce3e1896a.png\&quot;,\&quot;site_mobile_logo_url\&quot;:\&quot;https://s3.community.roast.world/original/2X/a/a8c7f3ce33631b920c88a72a7b2b7a21c4f42b4a.png\&quot;,\&quot;site_favicon_url\&quot;:\&quot;https://s3.community.roast.world/optimized/2X/a/a504cde5414c0880660cf6eca078552683a8f3e0_2_32x32.png\&quot;,\&quot;site_logo_dark_url\&quot;:\&quot;https://s3.community.roast.world/original/2X/5/5a58a8d885ddfe4bd4a74b8559f1b81f3daab765.png\&quot;,\&quot;site_logo_small_dark_url\&quot;:\&quot;https://s3.community.roast.world/original/2X/0/050200b1fa37f64527cd70839e431eb8ef888071.png\&quot;,\&quot;site_mobile_logo_dark_url\&quot;:\&quot;https://s3.community.roast.world/original/2X/0/050200b1fa37f64527cd70839e431eb8ef888071.png\&quot;}&quot;,&quot;customHTML&quot;:&quot;{\&quot;top\&quot;:\&quot;\&quot;,\&quot;footer\&quot;:\&quot;\&quot;}&quot;,&quot;banner&quot;:&quot;{\&quot;html\&quot;:\&quot;\u003cp\u003eHi, we are aware of a build issue causing connection issues for some of you. If you are affected, you need to delete dependencies before restarting the app.\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eUpdate:\u003c\\/strong\u003e\u003cbr\u003e\\nWe have released a new RoasTime version that will fix this issue by installing the new version. Please go to \u003ca href=\\\&quot;https://roastime.aillio.com\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\u003ehttps://roastime.aillio.com\u003c\\/a\u003e and install the latest version (v4.8.1 for Windows and v4.8.0 for MacOS and Linux) to rectify this issue. Alternatively, see the below original post.\u003c\\/p\u003e\\n\u003cp\u003eAgain, apologies. Thank you for your understanding.\u003c\\/p\u003e\\n\u003cblockquote\u003e\\n\u003cp\u003eOriginal Post:\u003c\\/p\u003e\\n\u003cp\u003eHi, we are aware of a build issue causing connection issues for some of you. If you are affected, you need to delete the dependencies folder before restarting the app.\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eMacOS terminal command:\u003c\\/strong\u003e\u003c\\/p\u003e\\n\u003cpre\u003e\u003ccode class=\\\&quot;lang-auto\\\&quot;\u003erm -rf ~/Library/Application\\\\ Support/RoasTime/deps\\n\u003c\\/code\u003e\u003c\\/pre\u003e\\n\u003cp\u003e\u003cstrong\u003eWindows terminal command:\u003c\\/strong\u003e\u003c\\/p\u003e\\n\u003cp\u003e\u003ccode\u003erd /s /q C:\\\\Users\\\\\\\&quot;YOUR USER NAME\\\&quot;\\\\AppData\\\\Roaming\\\\RoasTime\\\\deps\u003c\\/code\u003e\u003c\\/p\u003e\\n\u003cp\u003eAs an alternative to the above commands, you can manually remove the “deps” folder at the following location depending on your operating system. Hidden files/folders may need to be enabled first before attempting this.\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eWindows\u003c\\/strong\u003e\u003cbr\u003e\\nPath: \u003ccode\u003eC:\\\\Users\\\\\\\&quot;YOUR USER NAME\\\&quot;\\\\AppData\\\\Roaming\\\\RoasTime\\\\deps\u003c\\/code\u003e\u003cbr\u003e\\n\u003ca href=\\\&quot;https://support.microsoft.com/en-us/windows/view-hidden-files-and-folders-in-windows-97fbc472-c603-9d90-91d0-1166d1d9f4b5\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\u003eHow to view hidden files on Windows\u003c\\/a\u003e\u003c\\/p\u003e\\n\u003cp\u003e\u003cstrong\u003eMac\u003c\\/strong\u003e\u003cbr\u003e\\nPath: \u003ccode\u003e~/Library/Application\\\\ Support/RoasTime/deps\u003c\\/code\u003e\u003cbr\u003e\\n\u003ca href=\\\&quot;https://www.graphpad.com/support/faq/how-to-view-files-on-your-mac-that-are-normally-invisible/#:~:text=In%20Finder%2C%20open%20up%20your,hidden%20files%20will%20become%20visible.\\\&quot; rel=\\\&quot;noopener nofollow ugc\\\&quot;\u003eHow to view hidden files on Mac\u003c\\/a\u003e\u003c\\/p\u003e\\n\u003cp\u003eWe apologize for the inconvenience and for not posting sooner but we didn’t realize it was effecting many people. Steps are being taken to ensure this doesn’t happen again.\u003c\\/p\u003e\\n\u003c\\/blockquote\u003e\&quot;,\&quot;key\&quot;:16117,\&quot;url\&quot;:\&quot;https://community.roast.world/t/connection-and-dependency-issue/16117\&quot;}&quot;,&quot;customEmoji&quot;:&quot;[]&quot;,&quot;isReadOnly&quot;:&quot;false&quot;,&quot;isStaffWritesOnly&quot;:&quot;false&quot;,&quot;activatedThemes&quot;:&quot;{\&quot;4\&quot;:\&quot;Default\&quot;,\&quot;7\&quot;:\&quot;Custom Header Links\&quot;,\&quot;12\&quot;:\&quot;discourse-category-banners\&quot;,\&quot;11\&quot;:\&quot;discourse gifs\&quot;,\&quot;8\&quot;:\&quot;Manrope Font\&quot;,\&quot;15\&quot;:\&quot;Easy Footer\&quot;,\&quot;16\&quot;:\&quot;Discourse Top Contributors Sidebar\&quot;,\&quot;17\&quot;:\&quot;User Card Directory\&quot;}&quot;,&quot;topic_13967&quot;:&quot;{\&quot;post_stream\&quot;:{\&quot;posts\&quot;:[{\&quot;id\&quot;:34153,\&quot;name\&quot;:\&quot;Ka Fei\&quot;,\&quot;username\&quot;:\&quot;kafei\&quot;,\&quot;avatar_template\&quot;:\&quot;/user_avatar/community.roast.world/kafei/{size}/144_2.png\&quot;,\&quot;created_at\&quot;:\&quot;2024-01-13T02:35:06.381Z\&quot;,\&quot;cooked\&quot;:\&quot;\\u003cp\\u003eUriel Oropeza won Mexico’s roasting championship in 2021 and competed in the 2023 World Roasting Championships in Taiwan. Before the competition began, he stopped by our office for an interview and later, back home in Mexico City, developed a curve he thought our users may enjoy.\\u003c/p\\u003e\\n\\u003cp\\u003eIn his words:\\u003c/p\\u003e\\n\\u003cp\\u003e“This curve is designed for a washed coffee from the state of Chiapas, a Bourbon variety from Mexico.\\u003c/p\\u003e\\n\\u003cp\\u003eIt starts at a preheat temperature of 270C, with an initial power of 4 and an airflow of 2. This temperature is ideal for 650g because, from my experience, a higher initial temperature, if the bean structure can handle it without causing any defects such as scorching, tends to result in a greater aroma intensity in the coffee.\\u003c/p\\u003e\\n\\u003cp\\u003eThe purpose of extending the drying stage is to eliminate more moisture so that during the crack, the caramelization reaction is more robust. For this reason, heat is dissipated with the help of gradual increases in airflow. This achieves an intense aroma, high sweetness, and a medium-bodied, syrupy texture in the coffee.\\u003c/p\\u003e\\n\\u003cp\\u003eIt’s an ideal curve for our customers who prefer espresso or home consumers who enjoy coffee prepared in an electric coffee maker because the curve is suitable for promoting greater solubility of the coffee’s chemical compounds, providing balance, intensity, and body.\\\&quot;\\u003c/p\\u003e\\n\\u003cp\\u003eThis is a tricky one to land, so make sure to read all the Roast Recipe notes before you run it! Check it out \\u003ca href=\\\&quot;https://aillio.com/?page_id=36017\\\&quot;\\u003ehere.\\u003c/a\\u003e\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:1,\&quot;post_type\&quot;:1,\&quot;updated_at\&quot;:\&quot;2024-01-13T02:35:06.381Z\&quot;,\&quot;reply_count\&quot;:0,\&quot;reply_to_post_number\&quot;:null,\&quot;quote_count\&quot;:0,\&quot;incoming_link_count\&quot;:161,\&quot;reads\&quot;:185,\&quot;readers_count\&quot;:184,\&quot;score\&quot;:932.0,\&quot;yours\&quot;:false,\&quot;topic_id\&quot;:13967,\&quot;topic_slug\&quot;:\&quot;mexicos-champion-uriel-oropeza-with-a-light-roast-recipe-for-espresso\&quot;,\&quot;display_username\&quot;:\&quot;Ka Fei\&quot;,\&quot;primary_group_name\&quot;:\&quot;aillio\&quot;,\&quot;flair_name\&quot;:\&quot;aillio\&quot;,\&quot;flair_url\&quot;:\&quot;https://s3.community.roast.world/original/2X/a/a504cde5414c0880660cf6eca078552683a8f3e0.png\&quot;,\&quot;flair_bg_color\&quot;:\&quot;FFFFFF\&quot;,\&quot;flair_color\&quot;:\&quot;\&quot;,\&quot;flair_group_id\&quot;:42,\&quot;version\&quot;:1,\&quot;can_edit\&quot;:false,\&quot;can_delete\&quot;:false,\&quot;can_recover\&quot;:false,\&quot;can_see_hidden_post\&quot;:false,\&quot;can_wiki\&quot;:false,\&quot;link_counts\&quot;:[{\&quot;url\&quot;:\&quot;https://ai t profile record is helpful.\\u003c/p\\u003e\\n\\u003cp\\u003eYou all, and some of the pros you get to share, all have something we do not:  you talk to other professionals about roasting. Most of us have a solitary experience and do not have a verbal or linguistic relationship with roasting, and spend more time analyzing graphs.\\u003c/p\\u003e\\n\\u003cp\\u003eWhile there is the danger of people trying to trace the graph, those people are probably hopeless anyway. The offshoot benefit is that many of us take into consideration many external factors when looking at graphs. Because we might roast through the year in different places and actually need to be aware of these things.\\u003c/p\\u003e\\n\\u003cp\\u003eHaving the intention and roasting theory behind the roast is obviously the most valuable part of these things, but having the live data profile gives valuable context that we are all much more familiar with in terms of tangible information.\\u003c/p\\u003e\\n\\u003cp\\u003eAgain, we live and breathe these graphs, so to exclude them is to ignore the fact that is solo roasters do not have any other means of understanding things. We don’t have a crew of people to talk with. We don’t often go to events etc. our whole thinking about roasting is shaped by these graphs.\\u003c/p\\u003e\\n\\u003cp\\u003eIt’s like speaking a different language trying to make sense of a recipe. So having the story, intention, recipe, and graph would be exponentially more clear to us what is happening.\\u003c/p\\u003e\\n\\u003cp\\u003eThanks for recognizing this and looking into adding them in the future!\\u003c/p\\u003e\\n\\u003cp\\u003eAlso, question, is there a way we can pull all of their roasts and look at how their roasting style trends through the year? Would be nice to be able to go to any user’s profile and just pull up all of their roasts and look for trends. Is that a feature?\\u003c/p\\u003e\&quot;,\&quot;post_number\&quot;:11,\&quot;post_type\&quot;:1,\&quot;updated_at\&quo                 <link itemprop="mainEntityOfPage" href="https://community.roast.world/t/mexicos-champion-uriel-oropeza-with-a-light-roast-recipe-for-espresso/13967">


              <span class="crawler-post-infos">

            <div class='post' itemprop='text'>
              <p>Uriel Oropeza won Mexico’s roasting championship in 2021 and competed in the 2023 World Roasting Championships in Taiwan. Before the competition began, he stopped by our office for an interview and later, back home in Mexico City, developed a curve he thought our users may enjoy.</p>
<p>In his words:</p>
<p>“This curve is designed for a washed coffee from the state of Chiapas, a Bourbon variety from Mexico.</p>
<p>It starts at a preheat temperature of 270C, with an initial power of 4 and an airflow of 2. This temperature is ideal for 650g because, from my experience, a higher initial temperature, if the bean structure can handle it without causing any defects such as scorching, tends to result in a greater aroma intensity in the coffee.</p>
<p>The purpose of extending the drying stage is to eliminate more moisture so that during the crack, the caramelization reaction is more robust. For this reason, heat is dissipated with the help of gradual increases in airflow. This achieves an intense aroma, high sweetness, and a medium-bodied, syrupy texture in the coffee.</p>
<p>It’s an ideal curve for our customers who prefer espresso or home consumers who enjoy coffee prepared in an electric coffee maker because the curve is suitable for promoting greater solubility of the coffee’s chemical compounds, providing balance, intensity, and body."</p>
<p>This is a tricky one to land, so make sure to read all the Roast Recipe notes before you run it! Check it out <a href="https://aillio.com/?page_id=36017">here.</a></p>
            </div>

              <p>Hey Krawford, we include the caveats because there are so many different factors that can influence the shape of a curve, we believe it’s more helpful to use the Roast Recipe as a reference to study the <em>intention</em> behind the curve rather than to try to match it precisely. (As opposed to when you are using a Roast Recipe to repeat roasts on your own roaster using the same bean and in the same environment, in which case you can expect it to track very closely.)</p>
<p>I will see if Uriel can fill in some blanks for you next week – and in the future we’ll be sure to ask for some more detail about the roasting conditions in their personal space. Thanks.</p>

            <div class='crawler-post-meta'>

            <div class='post' itemprop='text'>
              <p>Going to agree with the others here, seeing the actual roast profile record is helpful.</p>
<p>You all, and some of the pros you get to share, all have something we do not:  you talk to other professionals about roasting. Most of us have a solitary experience and do not have a verbal or linguistic relationship with roasting, and spend more time analyzing graphs.</p>
<p>While there is the danger of people trying to trace the graph, those people are probably hopeless anyway. The offshoot benefit is that many of us take into consideration many external factors when looking at graphs. Because we might roast through the year in different places and actually need to be aware of these things.</p>
<p>Having the intention and roasting theory behind the roast is obviously the most valuable part of these things, but having the live data profile gives valuable context that we are all much more familiar with in terms of tangible information.</p>
<p>Again, we live and breathe these graphs, so to exclude them is to ignore the fact that is solo roasters do not have any other means of understanding things. We don’t have a crew of people to talk with. We don’t often go to events etc. our whole thinking about roasting is shaped by these graphs.</p>
<p>It’s like speaking a different language trying to make sense of a recipe. So having the story, intention, recipe, and graph would be exponentially more clear to us what is happening.</p>
<p>Thanks for recognizing this and looking into adding them in the future!</p>
<p>Also, question, is there a way we can pull all of their roasts and look at how their roasting style trends through the year? Would be nice to be able to go to any user’s profile and just pull up all of their roasts and look for trends. Is that a feature?</p>
            </div>
